<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Spline 3D Design Framework</title>

<!-- Fonts -->
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet" />

<!-- Three.js for live 3D preview -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

<style>
  /* ── Reset & Variables ─────────────────────────────────── */
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg-deep:     #0a0c10;
    --bg-panel:    #11141b;
    --bg-surface:  #181c26;
    --bg-hover:    #1e2433;
    --border:      #252b3a;
    --border-glow: #00e5c833;
    --accent:      #00e5c8;
    --accent-dim:  #00e5c866;
    --accent-bg:   #00e5c80d;
    --warn:        #f59e0b;
    --err:         #ef4444;
    --text:        #e2e8f0;
    --text-dim:    #8892a6;
    --text-muted:  #4a5568;
    --user-bubble: #162033;
    --bot-bubble:  #181c26;
    --code-bg:     #0d1017;
    --font-body:   'Outfit', system-ui, sans-serif;
    --font-mono:   'JetBrains Mono', 'Fira Code', monospace;
    --radius:      10px;
    --radius-lg:   16px;
  }

  html, body {
    height: 100%; width: 100%;
    font-family: var(--font-body);
    background: var(--bg-deep);
    color: var(--text);
    overflow: hidden;
    -webkit-font-smoothing: antialiased;
  }

  /* ── Layout ─────────────────────────────────────────────── */
  .app {
    display: grid;
    grid-template-columns: 420px 1fr;
    grid-template-rows: 56px 1fr;
    height: 100vh;
    gap: 0;
  }

  /* ── Header Bar ─────────────────────────────────────────── */
  .header {
    grid-column: 1 / -1;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 20px;
    background: var(--bg-panel);
    border-bottom: 1px solid var(--border);
    z-index: 100;
  }

  .header-left {
    display: flex; align-items: center; gap: 14px;
  }

  .logo-mark {
    width: 32px; height: 32px;
    border-radius: 8px;
    background: linear-gradient(135deg, var(--accent), #0099ff);
    display: flex; align-items: center; justify-content: center;
    font-weight: 700; font-size: 14px; color: var(--bg-deep);
    font-family: var(--font-mono);
    letter-spacing: -1px;
  }

  .header-title {
    font-weight: 600; font-size: 15px;
    letter-spacing: -0.3px;
  }

  .header-title span {
    color: var(--accent);
    font-family: var(--font-mono);
    font-weight: 500;
  }

  .header-right {
    display: flex; align-items: center; gap: 12px;
  }

  .status-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 8px var(--accent-dim);
    animation: pulse-dot 2s ease-in-out infinite;
  }

  .status-dot.disconnected { background: var(--err); box-shadow: 0 0 8px #ef444466; }

  @keyframes pulse-dot {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  .status-label {
    font-size: 12px; color: var(--text-dim);
    font-family: var(--font-mono);
  }

  .scene-select {
    background: var(--bg-surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-family: var(--font-mono);
    font-size: 12px;
    padding: 6px 10px;
    outline: none;
  }

  .scene-select:focus { border-color: var(--accent); }

  .btn-icon {
    width: 34px; height: 34px;
    display: flex; align-items: center; justify-content: center;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--bg-surface);
    color: var(--text-dim);
    cursor: pointer;
    transition: all 0.15s;
  }

  .btn-icon:hover {
    border-color: var(--accent);
    color: var(--accent);
    background: var(--accent-bg);
  }

  /* ── Chat Panel ─────────────────────────────────────────── */
  .chat-panel {
    display: flex;
    flex-direction: column;
    background: var(--bg-panel);
    border-right: 1px solid var(--border);
    overflow: hidden;
  }

  .chat-messages {
    flex: 1;
    overflow-y: auto;
    padding: 20px 16px;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .chat-messages::-webkit-scrollbar { width: 5px; }
  .chat-messages::-webkit-scrollbar-track { background: transparent; }
  .chat-messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
  .chat-messages::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }

  /* Messages */
  .msg {
    max-width: 92%;
    padding: 12px 16px;
    border-radius: var(--radius);
    font-size: 13.5px;
    line-height: 1.6;
    animation: msg-in 0.3s cubic-bezier(0.16, 1, 0.3, 1);
    position: relative;
  }

  @keyframes msg-in {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .msg.user {
    align-self: flex-end;
    background: var(--user-bubble);
    border: 1px solid #1e3a5f;
    border-bottom-right-radius: 4px;
    color: #c4daf6;
  }

  .msg.bot {
    align-self: flex-start;
    background: var(--bot-bubble);
    border: 1px solid var(--border);
    border-bottom-left-radius: 4px;
  }

  .msg.bot .narration { margin-bottom: 8px; }

  .msg.bot .ops-summary {
    font-family: var(--font-mono);
    font-size: 11.5px;
    color: var(--accent);
    background: var(--code-bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 8px 12px;
    margin-top: 8px;
    white-space: pre-wrap;
    word-break: break-word;
  }

  .msg.bot .meta-row {
    display: flex; align-items: center; gap: 12px;
    margin-top: 8px;
    font-size: 11px;
    color: var(--text-muted);
    font-family: var(--font-mono);
  }

  .msg.bot .meta-row .model-tag {
    background: var(--bg-surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 2px 6px;
  }

  /* Typing indicator */
  .typing {
    align-self: flex-start;
    display: flex; gap: 5px;
    padding: 14px 18px;
    background: var(--bot-bubble);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    border-bottom-left-radius: 4px;
  }

  .typing span {
    width: 7px; height: 7px;
    background: var(--accent);
    border-radius: 50%;
    animation: typing-bounce 1.4s infinite ease-in-out;
  }

  .typing span:nth-child(2) { animation-delay: 0.2s; }
  .typing span:nth-child(3) { animation-delay: 0.4s; }

  @keyframes typing-bounce {
    0%, 80%, 100% { transform: scale(0.6); opacity: 0.4; }
    40% { transform: scale(1); opacity: 1; }
  }

  /* Empty state */
  .empty-state {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    color: var(--text-muted);
    text-align: center;
    padding: 40px;
  }

  .empty-state .icon-3d {
    width: 64px; height: 64px;
    border-radius: 16px;
    background: linear-gradient(135deg, var(--accent-bg), #0099ff0d);
    border: 1px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    font-size: 28px;
  }

  .empty-state h3 {
    font-size: 16px; font-weight: 600;
    color: var(--text-dim);
  }

  .empty-state p {
    font-size: 13px; line-height: 1.7;
    max-width: 280px;
  }

  .prompt-chips {
    display: flex; flex-wrap: wrap; gap: 8px;
    justify-content: center;
    margin-top: 4px;
  }

  .prompt-chip {
    padding: 7px 14px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: var(--bg-surface);
    color: var(--text-dim);
    font-size: 12px;
    cursor: pointer;
    transition: all 0.15s;
    font-family: var(--font-body);
  }

  .prompt-chip:hover {
    border-color: var(--accent);
    color: var(--accent);
    background: var(--accent-bg);
  }

  /* Input area */
  .chat-input-area {
    padding: 12px 16px 16px;
    border-top: 1px solid var(--border);
    background: var(--bg-panel);
  }

  .model-row {
    display: flex; align-items: center; gap: 8px;
    margin-bottom: 10px;
  }

  .model-row label {
    font-size: 11px;
    font-family: var(--font-mono);
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .model-select {
    flex: 1;
    background: var(--bg-surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-family: var(--font-mono);
    font-size: 12px;
    padding: 5px 8px;
    outline: none;
  }

  .model-select:focus { border-color: var(--accent); }

  .input-row {
    display: flex;
    align-items: flex-end;
    gap: 8px;
  }

  .input-row textarea {
    flex: 1;
    background: var(--bg-surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text);
    font-family: var(--font-body);
    font-size: 13.5px;
    padding: 10px 14px;
    resize: none;
    min-height: 42px;
    max-height: 120px;
    outline: none;
    transition: border-color 0.15s;
    line-height: 1.5;
  }

  .input-row textarea:focus { border-color: var(--accent); }

  .input-row textarea::placeholder { color: var(--text-muted); }

  .send-btn {
    width: 42px; height: 42px;
    border-radius: var(--radius);
    border: none;
    background: var(--accent);
    color: var(--bg-deep);
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.15s;
    flex-shrink: 0;
  }

  .send-btn:hover { filter: brightness(1.15); transform: scale(1.04); }
  .send-btn:disabled { opacity: 0.3; cursor: not-allowed; transform: none; }

  .send-btn svg { width: 18px; height: 18px; }

  /* ── Viewport Panel ────────────────────────────────────── */
  .viewport-panel {
    position: relative;
    overflow: hidden;
    background: var(--bg-deep);
  }

  .viewport-canvas {
    width: 100%;
    height: 100%;
    display: block;
  }

  /* Viewport overlay UI */
  .viewport-hud {
    position: absolute;
    top: 14px; left: 14px;
    display: flex; gap: 8px;
    z-index: 10;
  }

  .hud-badge {
    font-family: var(--font-mono);
    font-size: 11px;
    padding: 5px 10px;
    border-radius: 6px;
    background: #0a0c10cc;
    backdrop-filter: blur(8px);
    border: 1px solid var(--border);
    color: var(--text-dim);
    display: flex; align-items: center; gap: 6px;
  }

  .hud-badge .dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--accent);
  }

  .viewport-toolbar {
    position: absolute;
    bottom: 14px; left: 50%;
    transform: translateX(-50%);
    display: flex; gap: 6px;
    z-index: 10;
    padding: 6px;
    background: #0a0c10cc;
    backdrop-filter: blur(8px);
    border: 1px solid var(--border);
    border-radius: 10px;
  }

  .viewport-toolbar button {
    padding: 6px 14px;
    border-radius: 6px;
    border: 1px solid transparent;
    background: transparent;
    color: var(--text-dim);
    font-family: var(--font-mono);
    font-size: 11px;
    cursor: pointer;
    transition: all 0.15s;
  }

  .viewport-toolbar button:hover {
    color: var(--accent);
    border-color: var(--accent);
    background: var(--accent-bg);
  }

  .viewport-toolbar button.active {
    color: var(--accent);
    background: var(--accent-bg);
    border-color: var(--accent-dim);
  }

  /* Object list overlay */
  .object-list {
    position: absolute;
    top: 14px; right: 14px;
    width: 200px;
    max-height: 300px;
    overflow-y: auto;
    z-index: 10;
    background: #0a0c10dd;
    backdrop-filter: blur(12px);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 8px;
  }

  .object-list::-webkit-scrollbar { width: 4px; }
  .object-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  .object-list-title {
    font-family: var(--font-mono);
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    color: var(--text-muted);
    padding: 4px 6px 8px;
  }

  .object-item {
    display: flex; align-items: center; gap: 8px;
    padding: 6px 8px;
    border-radius: 6px;
    cursor: pointer;
    transition: background 0.1s;
    font-size: 12px;
  }

  .object-item:hover { background: var(--bg-hover); }

  .object-item .obj-icon {
    width: 22px; height: 22px;
    border-radius: 5px;
    display: flex; align-items: center; justify-content: center;
    font-size: 11px;
    flex-shrink: 0;
  }

  .object-item .obj-name {
    flex: 1;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    font-family: var(--font-mono);
    font-size: 11.5px;
    color: var(--text-dim);
  }

  .object-item .obj-color {
    width: 12px; height: 12px;
    border-radius: 3px;
    border: 1px solid var(--border);
    flex-shrink: 0;
  }

  /* Grid overlay */
  .grid-label {
    position: absolute;
    bottom: 60px; right: 14px;
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--text-muted);
    opacity: 0.5;
  }

  /* ── Toast notifications ───────────────────────────────── */
  .toast-container {
    position: fixed;
    top: 66px; right: 16px;
    z-index: 1000;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .toast {
    padding: 10px 16px;
    border-radius: 8px;
    background: var(--bg-surface);
    border: 1px solid var(--border);
    font-size: 12px;
    font-family: var(--font-mono);
    color: var(--text-dim);
    animation: toast-in 0.3s cubic-bezier(0.16, 1, 0.3, 1);
    display: flex; align-items: center; gap: 8px;
    backdrop-filter: blur(8px);
  }

  .toast.success { border-color: var(--accent); color: var(--accent); }
  .toast.error   { border-color: var(--err);    color: var(--err); }

  @keyframes toast-in {
    from { opacity: 0; transform: translateX(20px); }
    to { opacity: 1; transform: translateX(0); }
  }

  /* ── Responsive ────────────────────────────────────────── */
  @media (max-width: 800px) {
    .app { grid-template-columns: 1fr; }
    .viewport-panel { display: none; }
  }
</style>
</head>
<body>

<div class="app">

  <!-- ═══ Header ═══ -->
  <header class="header">
    <div class="header-left">
      <div class="logo-mark">S3D</div>
      <div class="header-title">Spline 3D &middot; <span>Design Framework</span></div>
    </div>
    <div class="header-right">
      <div class="status-dot" id="statusDot"></div>
      <span class="status-label" id="statusLabel">connecting...</span>
      <select class="scene-select" id="sceneSelect">
        <option value="default">default scene</option>
      </select>
      <button class="btn-icon" id="clearSceneBtn" title="Clear scene">
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M2 4h12M5 4V2h6v2M6 7v6M10 7v6M3 4l1 10h8l1-10"/></svg>
      </button>
    </div>
  </header>

  <!-- ═══ Chat Panel ═══ -->
  <section class="chat-panel" id="chatPanel">
    <div class="chat-messages" id="chatMessages">

      <div class="empty-state" id="emptyState">
        <div class="icon-3d">
          <svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>
        </div>
        <h3>Build 3D with words</h3>
        <p>Describe objects, scenes, and materials in natural language. They'll appear in the viewport in real time.</p>
        <div class="prompt-chips">
          <button class="prompt-chip" data-prompt="Create a red metallic sphere floating above a dark plane">metallic sphere</button>
          <button class="prompt-chip" data-prompt="Build a small city block with 3 buildings of different heights and colors">city block</button>
          <button class="prompt-chip" data-prompt="Make a glowing torus ring with a cone in the center">torus + cone</button>
          <button class="prompt-chip" data-prompt="Create a simple table with 4 legs and a flat top surface">table object</button>
        </div>
      </div>

    </div>

    <div class="chat-input-area">
      <div class="model-row">
        <label>model</label>
        <select class="model-select" id="modelSelect">
          <option value="anthropic/claude-sonnet-4-5">Claude Sonnet 4.5</option>
          <option value="openai/gpt-4o">GPT-4o</option>
          <option value="google/gemini-2.0-flash-001">Gemini 2.0 Flash</option>
          <option value="openrouter/auto">Auto (OpenRouter)</option>
        </select>
      </div>
      <div class="input-row">
        <textarea id="chatInput" rows="1" placeholder="Describe a 3D object or scene..."></textarea>
        <button class="send-btn" id="sendBtn" title="Send">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
        </button>
      </div>
    </div>
  </section>

  <!-- ═══ 3D Viewport ═══ -->
  <section class="viewport-panel" id="viewportPanel">
    <canvas class="viewport-canvas" id="viewport"></canvas>

    <div class="viewport-hud">
      <div class="hud-badge"><span class="dot"></span>Live Preview</div>
      <div class="hud-badge" id="objectCount">0 objects</div>
    </div>

    <div class="object-list" id="objectList">
      <div class="object-list-title">Scene Objects</div>
    </div>

    <div class="viewport-toolbar">
      <button id="btnReset" title="Reset camera">Reset</button>
      <button id="btnTop" title="Top view">Top</button>
      <button id="btnFront" title="Front view">Front</button>
      <button id="btnWire" title="Toggle wireframe">Wire</button>
    </div>

    <div class="grid-label">orbit: drag &middot; zoom: scroll &middot; pan: right-drag</div>
  </section>

</div>

<div class="toast-container" id="toasts"></div>

<!-- ═══════════════════════════════════════════════════════════
     JavaScript
     ═══════════════════════════════════════════════════════════ -->
<script>
(() => {
  // ── DOM refs ──────────────────────────────────────────────
  const chatMessages  = document.getElementById('chatMessages');
  const chatInput     = document.getElementById('chatInput');
  const sendBtn       = document.getElementById('sendBtn');
  const emptyState    = document.getElementById('emptyState');
  const modelSelect   = document.getElementById('modelSelect');
  const sceneSelect   = document.getElementById('sceneSelect');
  const clearSceneBtn = document.getElementById('clearSceneBtn');
  const statusDot     = document.getElementById('statusDot');
  const statusLabel   = document.getElementById('statusLabel');
  const objectCount   = document.getElementById('objectCount');
  const objectList    = document.getElementById('objectList');
  const toasts        = document.getElementById('toasts');
  const canvas        = document.getElementById('viewport');

  let history = [];
  let isSending = false;
  let wireframeMode = false;

  // ── Three.js Setup ────────────────────────────────────────
  const scene    = new THREE.Scene();
  const camera   = new THREE.PerspectiveCamera(50, 1, 0.1, 1000);
  const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });

  renderer.setPixelRatio(window.devicePixelRatio);
  renderer.shadowMap.enabled = true;
  renderer.shadowMap.type = THREE.PCFSoftShadowMap;
  renderer.toneMapping = THREE.ACESFilmicToneMapping;
  renderer.toneMappingExposure = 1.1;

  scene.background = new THREE.Color(0x0a0c10);

  // Fog
  scene.fog = new THREE.FogExp2(0x0a0c10, 0.018);

  // Grid helper
  const grid = new THREE.GridHelper(30, 30, 0x1a2030, 0x121822);
  grid.material.opacity = 0.6;
  grid.material.transparent = true;
  scene.add(grid);

  // Ambient light
  const ambient = new THREE.AmbientLight(0x445566, 0.6);
  scene.add(ambient);

  // Main directional
  const dirLight = new THREE.DirectionalLight(0xffffff, 1.2);
  dirLight.position.set(8, 12, 6);
  dirLight.castShadow = true;
  dirLight.shadow.mapSize.width = 2048;
  dirLight.shadow.mapSize.height = 2048;
  scene.add(dirLight);

  // Rim light
  const rimLight = new THREE.DirectionalLight(0x00e5c8, 0.3);
  rimLight.position.set(-5, 3, -5);
  scene.add(rimLight);

  // Camera position
  camera.position.set(8, 6, 10);
  camera.lookAt(0, 1, 0);

  // OrbitControls
  const controls = new THREE.OrbitControls(camera, canvas);
  controls.enableDamping = true;
  controls.dampingFactor = 0.08;
  controls.target.set(0, 1, 0);
  controls.minDistance = 2;
  controls.maxDistance = 80;

  function resizeViewport() {
    const panel = document.getElementById('viewportPanel');
    const w = panel.clientWidth;
    const h = panel.clientHeight;
    renderer.setSize(w, h);
    camera.aspect = w / h;
    camera.updateProjectionMatrix();
  }

  window.addEventListener('resize', resizeViewport);
  requestAnimationFrame(resizeViewport);

  // Render loop
  function animate() {
    requestAnimationFrame(animate);
    controls.update();
    renderer.render(scene, camera);
  }
  animate();

  // ── 3D Object Factory ─────────────────────────────────────
  const sceneObjects = [];  // track all user-created meshes

  const OBJ_TYPE_ICONS = {
    cube:     '&#9632;', sphere: '&#9679;', cylinder: '&#9645;',
    cone:     '&#9650;', torus:  '&#9711;', plane:    '&#9644;',
    text:     'T',       light:  '&#9788;', image:    '&#9638;',
    group:    '&#9641;',
  };

  function createGeometry(type) {
    switch (type) {
      case 'sphere':   return new THREE.SphereGeometry(1, 48, 48);
      case 'cylinder': return new THREE.CylinderGeometry(0.8, 0.8, 2, 48);
      case 'cone':     return new THREE.ConeGeometry(1, 2, 48);
      case 'torus':    return new THREE.TorusGeometry(1, 0.35, 24, 64);
      case 'plane':    return new THREE.PlaneGeometry(4, 4);
      case 'text':     return new THREE.BoxGeometry(2, 0.5, 0.2); // placeholder
      case 'light':    return new THREE.SphereGeometry(0.3, 16, 16);
      default:         return new THREE.BoxGeometry(1.8, 1.8, 1.8);
    }
  }

  function hexToThreeColor(hex) {
    return new THREE.Color(hex || '#888888');
  }

  function addObjectToScene(obj) {
    const geo = createGeometry(obj.type);
    const color = hexToThreeColor(obj.color);

    const mat = new THREE.MeshStandardMaterial({
      color,
      roughness: 0.35,
      metalness: 0.6,
      wireframe: wireframeMode,
    });

    // Emissive glow for lights
    if (obj.type === 'light') {
      mat.emissive = color;
      mat.emissiveIntensity = 2;
    }

    const mesh = new THREE.Mesh(geo, mat);
    mesh.castShadow = true;
    mesh.receiveShadow = true;

    const p = obj.position || {};
    const r = obj.rotation || {};
    const s = obj.scale || {};

    mesh.position.set(p.x || 0, p.y || 0, p.z || 0);
    mesh.rotation.set(
      (r.x || 0) * Math.PI / 180,
      (r.y || 0) * Math.PI / 180,
      (r.z || 0) * Math.PI / 180
    );
    mesh.scale.set(s.x || 1, s.y || 1, s.z || 1);

    // Plane rotation fix
    if (obj.type === 'plane' && r.x === 0 && r.y === 0 && r.z === 0) {
      mesh.rotation.x = -Math.PI / 2;
    }

    mesh.userData = { name: obj.name, type: obj.type, objColor: obj.color };
    scene.add(mesh);
    sceneObjects.push(mesh);
  }

  function clearSceneObjects() {
    for (const mesh of sceneObjects) {
      scene.remove(mesh);
      mesh.geometry.dispose();
      mesh.material.dispose();
    }
    sceneObjects.length = 0;
    updateObjectListUI();
  }

  function rebuildScene(objects) {
    clearSceneObjects();
    for (const obj of objects) {
      addObjectToScene(obj);
    }
    updateObjectListUI();
  }

  function updateObjectListUI() {
    const title = objectList.querySelector('.object-list-title');
    objectList.innerHTML = '';
    objectList.appendChild(title);

    objectCount.textContent = `${sceneObjects.length} object${sceneObjects.length !== 1 ? 's' : ''}`;

    for (const mesh of sceneObjects) {
      const d = mesh.userData;
      const item = document.createElement('div');
      item.className = 'object-item';
      item.innerHTML = `
        <div class="obj-icon" style="background:${d.objColor || '#888'}22; color:${d.objColor || '#888'}">${OBJ_TYPE_ICONS[d.type] || '?'}</div>
        <div class="obj-name">${d.name || 'Untitled'}</div>
        <div class="obj-color" style="background:${d.objColor || '#888'}"></div>
      `;
      item.addEventListener('click', () => {
        controls.target.copy(mesh.position);
      });
      objectList.appendChild(item);
    }
  }

  // ── Viewport controls ─────────────────────────────────────
  document.getElementById('btnReset').addEventListener('click', () => {
    camera.position.set(8, 6, 10);
    controls.target.set(0, 1, 0);
  });

  document.getElementById('btnTop').addEventListener('click', () => {
    camera.position.set(0, 18, 0.01);
    controls.target.set(0, 0, 0);
  });

  document.getElementById('btnFront').addEventListener('click', () => {
    camera.position.set(0, 3, 14);
    controls.target.set(0, 1, 0);
  });

  document.getElementById('btnWire').addEventListener('click', function() {
    wireframeMode = !wireframeMode;
    this.classList.toggle('active', wireframeMode);
    for (const mesh of sceneObjects) {
      mesh.material.wireframe = wireframeMode;
    }
  });

  // ── Chat Logic ────────────────────────────────────────────
  function hideEmptyState() {
    if (emptyState) emptyState.style.display = 'none';
  }

  function showToast(text, type = '') {
    const t = document.createElement('div');
    t.className = `toast ${type}`;
    t.textContent = text;
    toasts.appendChild(t);
    setTimeout(() => t.remove(), 4000);
  }

  function addUserMessage(text) {
    hideEmptyState();
    const div = document.createElement('div');
    div.className = 'msg user';
    div.textContent = text;
    chatMessages.appendChild(div);
    chatMessages.scrollTop = chatMessages.scrollHeight;
  }

  function addBotMessage(data) {
    const div = document.createElement('div');
    div.className = 'msg bot';

    let html = `<div class="narration">${escapeHtml(data.narration || '')}</div>`;

    const ops = data.operations || [];
    if (ops.length > 0) {
      const opLines = ops.map(op => {
        const p = op.params || {};
        const details = p.name ? ` "${p.name}"` : '';
        const color = p.color ? ` ${p.color}` : '';
        return `${op.tool}${details}${color}`;
      }).join('\n');
      html += `<div class="ops-summary">${escapeHtml(opLines)}</div>`;
    }

    if (data.model || data.usage) {
      const u = data.usage || {};
      html += `<div class="meta-row">`;
      if (data.model) html += `<span class="model-tag">${escapeHtml(data.model)}</span>`;
      if (u.total_tokens) html += `<span>${u.total_tokens} tokens</span>`;
      html += `</div>`;
    }

    div.innerHTML = html;
    chatMessages.appendChild(div);
    chatMessages.scrollTop = chatMessages.scrollHeight;
  }

  function showTyping() {
    const t = document.createElement('div');
    t.className = 'typing';
    t.id = 'typingIndicator';
    t.innerHTML = '<span></span><span></span><span></span>';
    chatMessages.appendChild(t);
    chatMessages.scrollTop = chatMessages.scrollHeight;
  }

  function hideTyping() {
    const t = document.getElementById('typingIndicator');
    if (t) t.remove();
  }

  function escapeHtml(text) {
    const d = document.createElement('div');
    d.textContent = text;
    return d.innerHTML;
  }

  async function sendMessage(text) {
    if (isSending || !text.trim()) return;
    isSending = true;
    sendBtn.disabled = true;

    addUserMessage(text);
    history.push({ role: 'user', content: text });
    showTyping();

    try {
      const resp = await fetch('/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          message: text,
          sceneId: sceneSelect.value,
          history: history.slice(-20),
          model: modelSelect.value,
        }),
      });

      hideTyping();

      if (!resp.ok) {
        const err = await resp.json();
        addBotMessage({ narration: `Error: ${err.error || 'Request failed'}` });
        showToast(err.error || 'Request failed', 'error');
        return;
      }

      const data = await resp.json();
      addBotMessage(data);
      history.push({ role: 'assistant', content: data.narration || '' });

      // Rebuild 3D scene from server's object list
      if (data.objects && data.objects.length > 0) {
        rebuildScene(data.objects);
        showToast(`Scene updated: ${data.objects.length} objects`, 'success');
      }

    } catch (err) {
      hideTyping();
      addBotMessage({ narration: `Network error: ${err.message}` });
      showToast('Connection failed', 'error');
    } finally {
      isSending = false;
      sendBtn.disabled = false;
    }
  }

  // ── Input handlers ────────────────────────────────────────
  chatInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage(chatInput.value);
      chatInput.value = '';
      chatInput.style.height = 'auto';
    }
  });

  sendBtn.addEventListener('click', () => {
    sendMessage(chatInput.value);
    chatInput.value = '';
    chatInput.style.height = 'auto';
  });

  // Auto-resize textarea
  chatInput.addEventListener('input', () => {
    chatInput.style.height = 'auto';
    chatInput.style.height = Math.min(chatInput.scrollHeight, 120) + 'px';
  });

  // Prompt chips
  document.querySelectorAll('.prompt-chip').forEach(chip => {
    chip.addEventListener('click', () => {
      chatInput.value = chip.dataset.prompt;
      chatInput.focus();
    });
  });

  // Clear scene
  clearSceneBtn.addEventListener('click', async () => {
    const sid = sceneSelect.value;
    try {
      await fetch(`/scene/${sid}`, { method: 'DELETE' });
      clearSceneObjects();
      showToast('Scene cleared', 'success');
    } catch (e) {
      showToast('Failed to clear scene', 'error');
    }
  });

  // ── SSE for live scene updates ────────────────────────────
  function connectSSE() {
    const es = new EventSource('/scene-events');

    es.addEventListener('status', (e) => {
      const d = JSON.parse(e.data);
      statusDot.classList.remove('disconnected');
      statusLabel.textContent = d.message || 'connected';
    });

    es.addEventListener('scene-update', (e) => {
      const d = JSON.parse(e.data);
      if (d.sceneId === sceneSelect.value && d.objects) {
        rebuildScene(d.objects);
      }
    });

    es.addEventListener('open', () => {
      statusDot.classList.remove('disconnected');
      statusLabel.textContent = 'connected';
    });

    es.addEventListener('error', () => {
      statusDot.classList.add('disconnected');
      statusLabel.textContent = 'reconnecting...';
    });
  }

  // ── Init ──────────────────────────────────────────────────
  async function init() {
    try {
      const resp = await fetch('/config');
      const cfg = await resp.json();

      // Set default model in dropdown
      for (const opt of modelSelect.options) {
        if (opt.value === cfg.defaultModel) {
          opt.selected = true;
          break;
        }
      }

      statusDot.classList.remove('disconnected');
      statusLabel.textContent = 'ready';
    } catch {
      statusDot.classList.add('disconnected');
      statusLabel.textContent = 'offline';
    }

    connectSSE();
    resizeViewport();
  }

  init();
})();
</script>

</body>
